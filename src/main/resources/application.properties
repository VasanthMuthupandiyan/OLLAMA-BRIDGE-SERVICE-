# Load environment variables from .env file natively
spring.config.import=optional:file:.env[.properties]

# Spring Server Port (Reads PORT from .env, falls back to 7483)
server.port=${PORT:7483}

# Application Name
spring.application.name=ollama-bridge-service

# Ollama Connection Properties
# Base URL for local Ollama instance (default: http://localhost:11434)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Default Models configured for Chat and Embeddings
ollama.default.chat-model=${OLLAMA_CHAT_MODEL:gemma2:2b}
ollama.default.embedding-model=${OLLAMA_EMBEDDING_MODEL:embeddinggemma}

# Mandatory Bridge Authentication Settings
# The X-API-KEY header value required by clients calling this service
bridge.api-key=${BRIDGE_API_KEY}
